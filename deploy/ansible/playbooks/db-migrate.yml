---
- name: Run Database Migrations
  hosts: control_plane
  become: yes
  
  tasks:
    - name: Check if Control API container is running
      shell: docker ps --filter "name=clawdeploy-control-api" --format "{{{{.Names}}}}"
      register: container_check

    - name: Run migrations
      shell: docker exec clawdeploy-control-api node dist/db/migrate.js
      when: container_check.stdout != ""
      register: migration_result

    - name: Display migration result
      debug:
        var: migration_result.stdout_lines
