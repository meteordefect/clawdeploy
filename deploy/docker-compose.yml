version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: clawdeploy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - clawdeploy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  control-api:
    build:
      context: ./control-api
      dockerfile: Dockerfile
    container_name: clawdeploy-control-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3001
      OPENCLAW_DATA_PATH: /openclaw-data
    volumes:
      - openclaw-data:/openclaw-data
    networks:
      - clawdeploy
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: clawdeploy-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - clawdeploy
    depends_on:
      control-api:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
  openclaw-data:
    driver: local

networks:
  clawdeploy:
    driver: bridge
