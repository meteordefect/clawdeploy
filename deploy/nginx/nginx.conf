# FriendLabs Main Nginx Configuration (with SSL)
# Stage 2.O: Reverse Proxy for VPS Deployment
#
# This config is auto-deployed when SSL certificates exist.
# See nginx-nossl.conf for pre-SSL setup.
#
# Usage:
#   - Dashboard: https://beta.friendlabs.ai/
#   - API: https://beta.friendlabs.ai/api/
#   - Gateway health: https://beta.friendlabs.ai/gateway/health

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name beta.friendlabs.ai;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name beta.friendlabs.ai;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/beta.friendlabs.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.friendlabs.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # Basic auth for beta access
    auth_basic "FriendLabs Beta";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # API endpoints - proxy to File API container
    # Note: CORS is handled by the Express API, not nginx
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gateway health check (internal use)
    location /gateway/health {
        proxy_pass http://127.0.0.1:18789/health;
        proxy_http_version 1.1;
    }

    # Dashboard - proxy to dashboard container
    location / {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # OpenClaw Gateway WebSocket - proxy for dashboard chat feature
    # This endpoint is used by the dashboard's chat feature to connect to the gateway
    # No basic auth required - authentication is handled by the OpenClaw gateway itself
    location /gateway/ws {
        # Turn off basic auth for this endpoint
        auth_basic off;
        proxy_pass http://127.0.0.1:18789/;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Keep WebSocket connection alive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;

        # Disable buffering for WebSocket
        proxy_buffering off;
    }
}
