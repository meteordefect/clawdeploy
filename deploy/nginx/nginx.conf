# FriendLabs Main Nginx Configuration (with SSL)
# Stage 2.O: Reverse Proxy for VPS Deployment
#
# This config is auto-deployed when SSL certificates exist.
# See nginx-nossl.conf for pre-SSL setup.
#
# Usage:
#   - Dashboard: https://beta.friendlabs.ai/
#   - API: https://beta.friendlabs.ai/api/
#   - Gateway health: https://beta.friendlabs.ai/gateway/health

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name beta.friendlabs.ai;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name beta.friendlabs.ai;

    # SSL configuration (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/beta.friendlabs.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beta.friendlabs.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Basic auth for beta access
    auth_basic "FriendLabs Beta";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # API endpoints - proxy to File API container
    # Note: CORS is handled by the Express API, not nginx
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gateway health check (internal use)
    location /gateway/health {
        proxy_pass http://127.0.0.1:18789/health;
        proxy_http_version 1.1;
    }

    # Dashboard - proxy to dashboard container
    location / {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
