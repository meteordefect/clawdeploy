---
- name: Deploy ClawDeploy Custom (dashboard + api)
  hosts: control_plane
  become: yes

  tasks:
    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        mode: '0755'

    - name: Copy docker-compose.yml
      copy:
        src: ../../docker-compose.yml
        dest: "{{ compose_file }}"
        mode: '0644'

    - name: Copy .env file
      copy:
        src: ../../.env
        dest: "{{ env_file }}"
        mode: '0600'

    - name: Ensure VITE_GATEWAY_WS_URL in .env for chat (baked at build time)
      lineinfile:
        path: "{{ env_file }}"
        regexp: '^VITE_GATEWAY_WS_URL='
        line: "VITE_GATEWAY_WS_URL={{ gateway_ws_url }}"
      when: gateway_ws_url is defined

    - name: Copy API source
      synchronize:
        src: ../../api/
        dest: "{{ project_dir }}/api/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=dist"

    - name: Copy Dashboard source
      synchronize:
        src: ../../dashboard/
        dest: "{{ project_dir }}/dashboard/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=dist"

    - name: Copy redeploy.sh (for OpenClaw self-deploy)
      copy:
        src: ../../redeploy.sh
        dest: "{{ project_dir }}/redeploy.sh"
        mode: '0755'

    - name: Copy skills (for OpenClaw self-modify)
      synchronize:
        src: ../../skills/
        dest: "{{ project_dir }}/skills/"
        delete: yes

    - name: Build Docker images
      shell: cd {{ project_dir }} && docker compose build --no-cache
      environment:
        DOCKER_BUILDKIT: "1"

    - name: Ensure clawdeploy network exists (for gateway->api connectivity when main stack not deployed)
      command: docker network create clawdeploy
      register: net_create
      failed_when: false
      changed_when: net_create.rc == 0

    - name: Reset postgres (wipes DB)
      shell: cd {{ project_dir }} && docker compose down && docker volume rm clawdeploy-custom_postgres-data 2>/dev/null || true
      when: reset_postgres | default(false) | bool

    - block:
      - name: Start services
        shell: cd {{ project_dir }} && docker compose up -d --force-recreate
        environment:
          COMPOSE_HTTP_TIMEOUT: "200"

      - name: Wait for custom API to be ready
        wait_for:
          port: 3003
          host: 127.0.0.1
          timeout: 60

      rescue:
        - name: Show API logs on failure
          shell: docker logs clawdeploy-custom-api 2>&1 | tail -80
          register: api_logs
          ignore_errors: true

        - name: Display API logs
          debug:
            var: api_logs.stdout

        - name: Fail with context
          fail:
            msg: "Start services failed. See API logs above."

    - name: Clear deploy banner (API tracks manual deploys)
      uri:
        url: "http://127.0.0.1:3003/api/deploy/complete"
        method: POST
        status_code: 200

    - name: Check main clawdeploy exists
      stat:
        path: "{{ main_clawdeploy_dir }}/docker-compose.yml"
      register: main_compose_stat

    - name: Copy gateway skills override to main clawdeploy
      copy:
        src: ../../docker-compose.agent-mount.yml
        dest: "{{ main_clawdeploy_dir }}/docker-compose.override.yml"
        mode: '0644'
      when: main_compose_stat.stat.exists | default(false)

    - name: Recreate openclaw-gateway with clawdeploy-custom skills (so chat knows skill)
      shell: >
        cd {{ main_clawdeploy_dir }}
        && docker compose --profile openclaw-gateway up -d openclaw-gateway --force-recreate
      when: main_compose_stat.stat.exists | default(false)
      changed_when: true

    - name: Verify gateway is reachable after recreate
      uri:
        url: "http://127.0.0.1:18789/health"
        status_code: 200
      register: gateway_health
      when: main_compose_stat.stat.exists | default(false)
      retries: 24
      delay: 5
      until: gateway_health.status == 200
