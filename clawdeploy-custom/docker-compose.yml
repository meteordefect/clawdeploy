# ClawDeploy Custom Stack - dashboard + api, self-contained
# Deploy: ./deploy.sh
# Serves at /dashboard/custom (when nginx routes there) or direct on ports 3002/3003

services:
  postgres:
    image: postgres:16-alpine
    container_name: clawdeploy-custom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - custom
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: clawdeploy-custom-api
    user: "0:0"  # root - needed to access Docker socket for deploy/rollback
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 3001
      OPENCLAW_DATA_PATH: /openclaw-data
      CLAWDEPLOY_PROJECT_PATH: ${CLAWDEPLOY_PROJECT_PATH:-/opt/clawdeploy-custom}
    volumes:
      - openclaw-data:/openclaw-data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - custom
      - clawdeploy
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/dashboard/custom/api}
        VITE_GATEWAY_WS_URL: ${VITE_GATEWAY_WS_URL:-wss://localhost/gateway/ws}
        VITE_GATEWAY_TOKEN: ${VITE_GATEWAY_TOKEN:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/dashboard/custom/}
    container_name: clawdeploy-custom-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - custom
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
  openclaw-data:
    external: true
    name: openclaw-data  # Shared with main clawdeploy – needed for agents list (main must run first)

networks:
  custom:
    driver: bridge
  clawdeploy:
    external: true
    name: clawdeploy
